<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Monitor Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <h1>Network Monitor Dashboard</h1>

    <div class="dashboard">

        <!-- Processes -->
        <div class="card">
            <h2>Processes</h2>
            <canvas id="processChart"></canvas>
            <div id="processTop3" class="top3"></div>
        </div>

        <!-- Users -->
        <div class="card">
            <h2>Users</h2>
            <canvas id="userChart"></canvas>
            <div id="userTop3" class="top3"></div>
        </div>

        <!-- Protocols -->
        <div class="card">
            <h2>Protocols</h2>
            <canvas id="protocolChart"></canvas>
            <div id="protocolTop3" class="top3"></div>
        </div>

    </div>

    <div class="card search-card">

        <h2>Search</h2>

        <input id="searchInput" type="text" placeholder="Search..." />

        <div class="search-buttons">
            <button onclick="search('process')">Process</button>
            <button onclick="search('user')">User</button>
        </div>

        <div id="searchResults"></div>

    </div>

    <!-- Your JS -->
    <script src="app.js"></script>

</body>
</html>
